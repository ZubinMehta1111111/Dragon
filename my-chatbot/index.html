<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My AI Chatbot</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #f5f3ff, #e0e7ff);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .chat-container {
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 640px;
  }
  .chat-header {
    background: #6d28d9;
    color: white;
    padding: 18px 20px;
    font-weight: 600;
    font-size: 16px;
  }
  .chat-header span { font-weight: 400; font-size: 13px; opacity: 0.85; display: block; margin-top: 2px; }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #fafafa;
  }
  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.4;
    white-space: pre-wrap;
  }
  .msg.user {
    align-self: flex-end;
    background: #6d28d9;
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    align-self: flex-start;
    background: #ece9fe;
    color: #1f1f1f;
    border-bottom-left-radius: 4px;
  }
  .msg.typing { color: #888; font-style: italic; }
  .msg.error { background: #fee2e2; color: #991b1b; }
  .input-row {
    display: flex;
    padding: 12px;
    border-top: 1px solid #eee;
    background: white;
    gap: 8px;
  }
  input {
    flex: 1;
    border: 1px solid #ddd;
    border-radius: 24px;
    padding: 10px 16px;
    font-size: 14px;
    outline: none;
  }
  input:focus { border-color: #6d28d9; }
  button {
    background: #6d28d9;
    color: white;
    border: none;
    border-radius: 24px;
    padding: 0 20px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    My AI Assistant
    <span>Live and deployed 🎉</span>
  </div>
  <div class="messages" id="messages">
    <div class="msg bot">Hi! I'm live on the real internet now. Ask me anything.</div>
  </div>
  <div class="input-row">
    <input id="input" type="text" placeholder="Type a message..." />
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  let history = [];

  function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = 'msg ' + sender;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    addMessage(text, 'user');
    history.push({ role: 'user', content: text });
    inputEl.value = '';
    sendBtn.disabled = true;

    const typingEl = addMessage('typing...', 'bot typing');

    try {
      // Note: this calls OUR OWN backend (/api/chat), not Anthropic directly.
      // Our backend holds the secret API key, so it's never exposed here.
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      if (!response.ok) throw new Error('Server error');

      const data = await response.json();
      const reply = data.content.map(c => c.text || "").join("\n");
      typingEl.remove();
      addMessage(reply, 'bot');
      history.push({ role: 'assistant', content: reply });
    } catch (err) {
      typingEl.remove();
      addMessage("Something went wrong reaching the server. Check that your API key is set up correctly.", 'bot error');
    }
    sendBtn.disabled = false;
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
</script>

</body>
</html>
